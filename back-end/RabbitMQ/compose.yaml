services:
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    ports:
      - "5672:5672"      # Porta de comunicação AMQP
      - "15672:15672"    # Porta do painel Management (UI)
    volumes:
      - rabbitmq_dados:/var/lib/rabbitmq
    networks:
      - backend
    environment:
      - RABBITMQ_DEFAULT_USER=rabbit
      - RABBITMQ_DEFAULT_PASS=rabbitpass

volumes:
  rabbitmq_dados: