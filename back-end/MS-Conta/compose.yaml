services:
  ms-conta:
    image: ms-conta-spring
    container_name: ms-conta
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - backend
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      - SERVER_PORT=${APP_PORT}
      - SPRING_DATASOURCE_COMMAND_JDBC_URL=jdbc:postgresql://postgres-db:5432/conta_comando
      - SPRING_DATASOURCE_COMMAND_USERNAME=postgres
      - SPRING_DATASOURCE_COMMAND_PASSWORD=postgrespass
      - SPRING_DATASOURCE_QUERY_JDBC_URL=jdbc:postgresql://postgres-db:5432/conta_consulta
      - SPRING_DATASOURCE_QUERY_USERNAME=postgres
      - SPRING_DATASOURCE_QUERY_PASSWORD=postgrespass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=rabbit
      - SPRING_RABBITMQ_PASSWORD=rabbitpass
    depends_on:
      - rabbitmq
      - postgres-db

networks:
  backend:
    name: ms-conta_backend
    external: true
