services:
  ms-cliente:
    image: ms-cliente-spring
    container_name: ms-cliente
    build: 
      context: .
      dockerfile: ms-cliente.Dockerfile
    networks:
      - backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/cliente_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgrespass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=rabbit
      - SPRING_RABBITMQ_PASSWORD=rabbitpass
    depends_on:
      - rabbitmq
      - postgres-db