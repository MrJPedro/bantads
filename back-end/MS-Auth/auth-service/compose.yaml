services:
  ms-auth:
    image: ms-auth-spring
    container_name: ms-auth
    build: 
      context: ../
      dockerfile: ms-auth.Dockerfile
    networks:
      - backend
    depends_on:
      - rabbitmq
      - ms-auth-db

  ms-auth-db:
    image: mongodb/mongodb-community-server:latest
    container_name: ms-auth-db
    volumes:
      - ms_auth_dados:/data/db
    networks:
      - backend

volumes:
  ms_auth_dados: