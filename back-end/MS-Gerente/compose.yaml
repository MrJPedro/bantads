services:
  ms-gerente:
    image: ms-gerente-spring
    container_name: ms-gerente
    build:
      context: .
      dockerfile: ms-gerente.Dockerfile
    networks:
      - backend
    ports:
      - 8082:8082
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/gerente_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgrespass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=rabbit
      - SPRING_RABBITMQ_PASSWORD=rabbitpass
      - MS_CLIENTE_URL=http://ms-cliente:8086
      - MS_CONTA_URL=http://ms-conta:8083
    depends_on:
      - rabbitmq
      - postgres-db
