<div [style.width]="largura" class="w-full">
  <div class="rounded-2xl bg-white p-3 shadow-sm ring-1 ring-gray-200">
    <div class="flex items-center gap-2">
      <i class="pi pi-search text-gray-400"></i>

      <input
        type="text"
        pInputText
        [ngModel]="value"
        (ngModelChange)="onInputChange($event)"
        [placeholder]="placeholder"
        [disabled]="disabled"
        class="w-full border-0 bg-transparent text-sm text-gray-800 outline-none ring-0 placeholder:text-gray-400 focus:ring-0 disabled:cursor-not-allowed disabled:text-gray-400"
      />

      @if (value) {
        <button
          type="button"
          (click)="limparCampo()"
          class="rounded-lg px-2 py-1 text-xs font-medium text-gray-500 transition hover:bg-gray-100 hover:text-red-500"
        >
          Limpar
        </button>
      }
    </div>
  </div>
</div>
