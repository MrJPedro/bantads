<div class="bg-surface-50 dark:bg-surface-950 px-6 py-20 md:px-20 lg:px-80">
            <div class="bg-surface-0 dark:bg-surface-900 p-8 md:p-12 shadow-sm rounded-2xl w-full max-w-sm mx-auto flex flex-col gap-8">
                <div class="flex flex-col items-center gap-4">
                    <div class="flex flex-col items-center gap-2 w-full">
                        <div class="text-center w-full">
                          <i class="pi pi-building text-blue-600 text-3xl"></i><!--Logo-->
                            <span class="text-surface-700 dark:text-surface-200 leading-normal">
                              BANTADS
                            </span>
                        </div>
                        <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold leading-tight text-center w-full">
                          Faça seu cadastro para continuar
                        </div>
                    </div>
                </div>
                <div class="flex flex-col gap-6 w-full">
                    <div class="flex flex-col gap-2 w-full">
                        <label for="email1" class="text-surface-900 dark:text-surface-0 font-medium leading-normal">
                          Email
                        </label>
                        <input
                          name="email"
                        pInputText
                        id="email1"
                        name="email"
                        type="email"
                        #emailCtrl="ngModel"
                        [(ngModel)]="dados.email"
                        required
                        email
                        placeholder="Email"
                        class="w-full px-3 py-2 shadow-sm rounded-lg"
                        />
                    </div>
                    <div class="flex flex-col gap-2 w-full">
                        <label class="text-surface-900 dark:text-surface-0 font-medium leading-normal">
                          Nome
                        </label>
                        <input name="nome" [(ngModel)]="dados.nome" pInputText type="text" placeholder="Nome" class="w-full px-3 py-2 shadow-sm rounded-lg" />
                    </div>
                    <div class="flex flex-col gap-2 w-full">
                        <label  class="text-surface-900 dark:text-surface-0 font-medium leading-normal">
                          CPF
                        </label>
                        <input [(ngModel)]="dados.cpf" mask="000.000.000-00" pInputText type="text" placeholder="CPF" class="w-full px-3 py-2 shadow-sm rounded-lg" />
                    </div>
                    <div class="flex flex-col gap-2 w-full">
                        <label class="text-surface-900 dark:text-surface-0 font-medium leading-normal">
                          Telefone
                        </label>
                        <input name="telefone" [(ngModel)]="dados.telefone" mask="(00) 00000-0000" pInputText type="tel" placeholder="(00) 00000-0000" class="w-full px-3 py-2 shadow-sm rounded-lg" />
                    </div>
                    <div class="flex flex-col gap-2 w-full">
                        <label class="text-surface-900 dark:text-surface-0 font-medium leading-normal">
                          Salário
                        </label>
                        <p-inputNumber 
                          id="salario" 
                          name="salario" 
                          [(ngModel)]="dados.salario" 
                          mode="currency" 
                          currency="BRL" 
                          locale="pt-BR" 
                          placeholder="R$ 0,00"
                          class="w-full">
                        </p-inputNumber>
                    </div>
        <div class="card flex justify-center">
            <p-button (click)="showDialog()" label="Preencher endereço" icon="pi pi-address-book" styleClass="!bg-blue-500 !border-blue-500 hover:!bg-blue-600 hover:!border-blue-600 !text-white"/>
            <p-dialog header="Cadastro" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
                <span class="p-text-secondary block mb-8">Insira aqui suas informações de endereço</span>
                <div class="flex items-center gap-4 mb-4">
                    <label class="font-semibold w-24">CEP</label>
                    <input name="cep" (input)="onCepInput()" [(ngModel)]="dados.CEP" mask="00.000-000" pInputText class="flex-auto" autocomplete="off" />
                </div>
                <div class="flex items-center gap-4 mb-8">
                    <label for="email" class="font-semibold w-24">Estado</label>
                    <input name="estado" [(ngModel)]="dados.estado" pInputText class="flex-auto" autocomplete="off" />
                </div>
                <div class="flex items-center gap-4 mb-8">
                    <label for="email" class="font-semibold w-24">Cidade</label>
                    <input name="cidade" [(ngModel)]="dados.cidade" pInputText class="flex-auto" autocomplete="off" />
                </div>
                <div class="flex items-center gap-4 mb-8">
                    <label for="email" class="font-semibold w-24">Logradouro</label>
                    <input name="logradouro" [(ngModel)]="dados.logradouro" pInputText class="flex-auto" autocomplete="off" />
                </div>
                <div class="flex items-center gap-4 mb-8">
                    <label for="email" class="font-semibold w-24">Número</label>
                    <input name="numero" [(ngModel)]="dados.numero" pInputText class="flex-auto" autocomplete="off" />
                </div>
                <div class="flex items-center gap-4 mb-8">
                    <label for="email" class="font-semibold w-24">Complemento </label>
                    <input name="complemento" [(ngModel)]="dados.complemento" pInputText class="flex-auto" autocomplete="off" />
                </div>
                <div class="flex justify-end gap-2">
                    <p-button label="Cancelar" severity="secondary" (click)="visible = false" />
                    <p-button label="Salvar" (click)="visible = false" />
                </div>
            </p-dialog>
            <p-dialog header="Cadastro Realizado" [modal]="true" [(visible)]="showConfirmation" [style]="{ width: '25rem' }" [closable]="false">
                <div class="flex flex-col items-center gap-4">
                    <i class="pi pi-check-circle text-green-600 text-4xl"></i>
                    <span class="p-text-secondary text-center">
                        Sua solicitação de cadastro foi enviada com sucesso!
                    </span>
                    <span class="p-text-secondary text-center font-semibold">
                        Aguarde a aprovação do gerente para ativar sua conta.
                    </span>
                </div>
                <ng-template pTemplate="footer">
                    <p-button label="Fechar" (click)="showConfirmation = false" />
                </ng-template>
            </p-dialog>
        </div>
                </div>
                <button pButton
                        (click)="cadastrar()"
                        class="w-full py-2 rounded-lg flex justify-center items-center gap-2">
                                        <i pButtonIcon class="pi pi-check-circle text-base! leading-normal!"></i>
                    <span pButtonLabel>
                                            Cadastrar
                    </span>
                </button>
            </div>
        </div>
