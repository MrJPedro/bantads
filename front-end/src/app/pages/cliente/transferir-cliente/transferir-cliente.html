<p-toast />

<div class="rounded-xl bg-white p-6 shadow-sm">
	<h2 class="text-2xl font-bold mb-6">Transferir</h2>

	<p-card>
		<div class="flex flex-col gap-4">
			<div>
				<label for="contaDestino" class="block mb-2 font-medium">Conta de destino</label>
				<input
					pInputText
					inputId="contaDestino"
					[(ngModel)]="contaDestino"
					class="w-full"
					placeholder="Informe o número da conta" />
			</div>

			<div>
				<label for="valorTransferencia" class="block mb-2 font-medium">Valor da transferência</label>
				<p-inputNumber
					inputId="valorTransferencia"
					[(ngModel)]="valor"
					mode="currency"
					currency="BRL"
					locale="pt-BR"
					[min]="0.01"
					[minFractionDigits]="2"
					[maxFractionDigits]="2"
					styleClass="w-full"
					placeholder="R$ 0,00">
				</p-inputNumber>
			</div>

			<div class="flex items-center gap-2">
				<p-button
					label="Confirmar Transferência"
					icon="pi pi-arrow-right-arrow-left"
					[loading]="enviando"
					(onClick)="transferir()">
				</p-button>

				<a
					pButton
					routerLink="/cliente/tela-inicial"
					class="p-button-outlined"
					icon="pi pi-arrow-left"
					label="Voltar">
				</a>
			</div>
		</div>
	</p-card>
</div>
