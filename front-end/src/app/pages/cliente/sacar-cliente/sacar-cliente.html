<p-toast />

<div class="rounded-xl bg-white p-6 shadow-sm">
	<h2 class="text-2xl font-bold mb-6">Sacar</h2>

	<p-card>
		<div class="flex flex-col gap-4">
			<div>
				<label for="valorSaque" class="block mb-2 font-medium">Valor do saque</label>
				<p-inputNumber
					inputId="valorSaque"
					[(ngModel)]="valor"
					mode="currency"
					currency="BRL"
					locale="pt-BR"
					[min]="0.01"
					[minFractionDigits]="2"
					[maxFractionDigits]="2"
					styleClass="w-full"
					placeholder="R$ 0,00">
				</p-inputNumber>
			</div>

			<div class="flex items-center gap-2">
				<p-button
					label="Confirmar Saque"
					icon="pi pi-wallet"
					severity="danger"
					[loading]="enviando"
					(onClick)="sacar()">
				</p-button>

				<a
					pButton
					routerLink="/cliente/tela-inicial"
					class="p-button-outlined"
					icon="pi pi-arrow-left"
					label="Voltar">
				</a>
			</div>
		</div>
	</p-card>
</div>
