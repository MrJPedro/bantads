<div class="flex min-h-screen bg-slate-50">
    <aside class="w-64 bg-white border-r border-gray-200 fixed h-full hidden md:block">
        <a routerLink="/landing-page" class="p-6 flex items-center gap-2 border-b border-gray-100 cursor-pointer">
            <i class="pi pi-building text-blue-600 text-2xl"></i>
            <span class="text-xl font-bold text-gray-800">BANTADS</span>
        </a>
        <nav class="p-4 flex flex-col gap-2">
            <div class="text-xs font-bold text-gray-400 uppercase p-2">Menu</div>
            <a routerLink="/administrador/tela-inicial" routerLinkActive="bg-blue-200 font-medium" class="flex items-center p-3 rounded-lg hover:bg-blue-400">
                <i class="pi pi-home mr-3"></i> Início
            </a>
            <a routerLink="/administrador/relatorio-clientes" routerLinkActive="bg-blue-200 font-medium" class="flex items-center p-3 rounded-lg hover:bg-blue-400">
                <i class="pi pi-receipt mr-3"></i> Relatório clientes
            </a>
            <a routerLink="/administrador/gerenciar-gerentes" routerLinkActive="bg-blue-200 font-medium" class="flex items-center p-3 rounded-lg hover:bg-blue-400">
                <i class="pi pi-users mr-3"></i> Gerentes
            </a>
        </nav>
    </aside>

    <div class="flex-1 md:ml-64 flex flex-col">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 sticky top-0 z-10">
            <div class="font-medium text-gray-500"></div>
            <div class="flex items-center gap-4">
                <i class="pi pi-bell text-gray-400"></i>
                <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold">
                    <i class="pi pi-user"></i>
                </div>
            </div>
        </header>

        <main class="p-8">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
