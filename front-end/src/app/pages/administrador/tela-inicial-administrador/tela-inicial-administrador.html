<p-toast />

<div class="rounded-xl bg-white p-6 shadow-sm">
    <h2 class="text-2xl font-bold mb-6">Gerentes</h2>

    <p-table
        [value]="gerentes()"
        [rows]="10"
        [paginator]="true"
        responsiveLayout="scroll"
        styleClass="p-datatable-gridlines">

        <ng-template #header>
            <tr>
                <th>Nome</th>
                <th>Qtd. Clientes</th>
                <th>Soma Saldo Pos.</th>
                <th>Soma Saldo Neg.</th>
            </tr>
        </ng-template>

        <ng-template #body let-gerente>
            <tr>
                <td>{{ gerente.nome }}</td>
                <td>{{ gerente.qtdClientes }}</td>
                <td>{{ gerente.somaPositiva | currency: 'BRL' }}</td>
                <td>{{ gerente.somaNegativa | currency: 'BRL' }}</td>
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr>
                <td colspan="4" class="text-center p-4">Nenhuma pendência encontrada.</td>
            </tr>
        </ng-template>
    </p-table>
</div>
