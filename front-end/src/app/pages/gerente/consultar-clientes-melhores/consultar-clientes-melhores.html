<div class="rounded-xl bg-white p-6 shadow-sm">
    <h2 class="text-2xl font-bold mb-6">Melhores Clientes</h2>

    <p-table
        [value]="clientesExibidos()"
        [rows]="10"
        [paginator]="true"
        responsiveLayout="scroll"
        styleClass="p-datatable-gridlines"
    >
        <ng-template #header>
            <tr>
                <th>CPF</th>
                <th>Nome</th>
                <th>Cidade</th>
                <th>Estado</th>
                <th>Saldo <p-sortIcon field="saldo" /></th>
            </tr>
        </ng-template>

        <ng-template #body let-cliente>
            <tr>
                <td>{{ cliente.cpf }}</td>
                <td>{{ cliente.nome }}</td>
                <td>{{ cliente.cidade }}</td>
                <td>{{ cliente.estado }}</td>
                <td>{{ cliente.saldo | currency: 'BRL' }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>
