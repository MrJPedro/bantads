<p-toast />

<div class="rounded-xl bg-white p-6 shadow-sm">
    <h2 class="text-2xl font-bold mb-6">Solicitações de Autocadastro</h2>

    <p-table 
        [value]="clientes()" 
        [rows]="10" 
        [paginator]="true" 
        responsiveLayout="scroll"
        styleClass="p-datatable-gridlines">
        
        <ng-template #header>
            <tr>
                <th pSortableColumn="cpf">CPF <p-sortIcon field="cpf" /></th>
                <th pSortableColumn="nome">Nome <p-sortIcon field="nome" /></th>
                <th pSortableColumn="salario">Salário <p-sortIcon field="salario" /></th>
                <th class="text-center">Ações</th>
            </tr>
        </ng-template>

        <ng-template #body let-cliente>
            <tr>
                <td>{{ cliente.cpf }}</td>
                <td>{{ cliente.nome }}</td>
                <td>{{ cliente.salario | currency: 'BRL' }}</td>
                <td class="text-center">
                    <div class="flex justify-center gap-2">
                        <p-button 
                            icon="pi pi-check" 
                            severity="success" 
                            [rounded]="true" 
                            [outlined]="true" 
                            (onClick)="aprovar(cliente)" />
                        
                        <p-button 
                            icon="pi pi-times" 
                            severity="danger" 
                            [rounded]="true" 
                            [outlined]="true" 
                            (onClick)="rejeitar(cliente)" />
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr>
                <td colspan="4" class="text-center p-4">Nenhuma pendência encontrada.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog 
    [(visible)]="dialogRecusa" 
    [style]="{ width: '450px' }" 
    header="Confirmar Recusa" 
    [modal]="true">
    
    <div class="flex flex-col gap-4">
        <span>Informe o motivo da recusa para <b>{{ clienteSelecionado?.nome }}</b>:</span>
        
        <textarea 
            pTextarea 
            [(ngModel)]="motivoRecusa" 
            rows="4" 
            class="w-full" 
            placeholder="O motivo será enviado por e-mail..."></textarea>
    </div>

    <ng-template #footer>
        <p-button label="Cancelar" icon="pi pi-times" text (onClick)="dialogRecusa = false" />
        <p-button label="Confirmar Recusa" icon="pi pi-check" severity="danger" (onClick)="confirmarRecusa()" />
    </ng-template>
</p-dialog>
