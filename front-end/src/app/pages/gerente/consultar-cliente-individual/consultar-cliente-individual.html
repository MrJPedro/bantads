<p-toast />

<div class="rounded-xl bg-white p-6 shadow-sm">
    <h2 class="text-2xl font-bold mb-6">Consultar cliente</h2>

    <p-table
        [value]="clientesFiltrados()"
        [rows]="10"
        [paginator]="true"
        responsiveLayout="scroll"
        styleClass="p-datatable-gridlines"
        [sortField]="sortField"
        [sortOrder]="sortOrder"
    >
        <ng-template #caption>
            <app-barra-pesquisa
                [placeholder]="'Digite o CPF'"
                [value]="termoBusca()"
                icone="pi pi-id-card"
                (pesquisar)="aoPesquisar($event)"
                mask="000.000.000-00">
                
            </app-barra-pesquisa>
        </ng-template>
        <ng-template #header>
            <tr>
                <th>CPF</th>
                <th pSortableColumn="nome">Nome <p-sortIcon field="nome" /></th>
                <th>Cidade</th>
                <th>Estado</th>
                <th>Saldo</th>
                <th>Limite</th>
            </tr>
        </ng-template>

        <ng-template #body let-cliente>
            <tr>
                <td>{{ cliente.cpf }}</td>
                <td>{{ cliente.nome }}</td>
                <td>{{ cliente.cidade }}</td>
                <td>{{ cliente.estado }}</td>
                <td>{{ cliente.saldo | currency: 'BRL' }}</td>
                <td>{{ cliente.limite | currency: 'BRL' }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>
