<div class="bg-surface-50 dark:bg-surface-950 px-6 py-20 md:px-20 lg:px-80">
            <div class="bg-surface-0 dark:bg-surface-900 p-8 md:p-12 shadow-sm rounded-2xl w-full max-w-sm mx-auto flex flex-col gap-8">
                <div class="flex flex-col items-center gap-4">
                    <div class="flex flex-col items-center gap-2 w-full">
                        <div class="text-center w-full">
                          <i class="pi pi-building text-blue-600 text-3xl"></i><!--Logo-->
                            <span class="text-surface-700 dark:text-surface-200 leading-normal">
                              BANTADS
                            </span>
                        </div>
                        <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold leading-tight text-center w-full">
                          Bem-Vindo
                        </div>
                    </div>
                </div>

                <form #loginForm="ngForm" (ngSubmit)="login(loginForm)">
                  <div class="flex flex-col gap-6 w-full">
                    <div class="flex flex-col gap-2 w-full">
                        <label for="email" class="text-surface-900 dark:text-surface-0 font-medium leading-normal">
                          Email
                        </label>
                        <input pInputText id="email" name="email" type="text" placeholder="Email" class="w-full px-3 py-2 shadow-sm rounded-lg" [(ngModel)]="credenciais.email" required #email="ngModel"/>
                    </div>
                    <div class="flex flex-col gap-2 w-full">
                        <label for="senha" class="text-surface-900 dark:text-surface-0 font-medium leading-normal">
                          Senha
                        </label>
                        <input pInputText id="senha" name="senha" type="password" placeholder="Senha" class="w-full px-3 py-2 shadow-sm rounded-lg" [(ngModel)]="credenciais.senha" required #senha="ngModel"/>
                    </div>
                  </div>
                  <div class="flex flex-col gap-2 w-full">
                    <button pButton class="w-full py-2 mt-10 rounded-lg flex justify-center items-center gap-2" type="submit" [disabled]="loginForm.invalid">
                        <i pButtonIcon class="pi pi-user text-base! leading-normal!"></i>
                        <span pButtonLabel>
                          Entrar
                        </span>
                    </button>
                  </div>
                </form>

            </div>
        </div>
